apiVersion: v2
name: vm-import-ui
description: >
  Web-based UI for importing virtual machines into Harvester / SUSE Virtualization clusters.
  Supports both the native VM Import Controller and Forklift (Konveyor MTV) migration engines.
type: application
version: 0.2.0
appVersion: "1.8.0"
icon: https://raw.githubusercontent.com/doccaz/vm-import-ui/master/frontend/public/favicon.svg
keywords:
  - harvester
  - vm-import
  - migration
  - virtualization
  - forklift
home: https://github.com/doccaz/vm-import-ui
sources:
  - https://github.com/doccaz/vm-import-ui
maintainers:
  - name: doccaz
    url: https://github.com/doccaz
annotations:
  # Rancher Apps catalog metadata — controls how the chart renders in the UI
  catalog.cattle.io/display-name: Harvester VM Import UI
  catalog.cattle.io/release-name: vm-import-ui
  catalog.cattle.io/namespace: vm-import-ui
  catalog.cattle.io/os: linux
  catalog.cattle.io/kube-version: ">= 1.20.0-0"
