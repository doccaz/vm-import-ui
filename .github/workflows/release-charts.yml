name: Release Helm Chart

# Publishes charts/ as a Helm repo served from GitHub Pages whenever a chart is
# changed directly on master. Charts are committed to the gh-pages branch
# (.tgz + index.yaml), NOT as GitHub Releases — see hack/publish-charts.sh.
#
# NOTE: bump `version` in a chart's Chart.yaml when you change its templates,
# otherwise the index keeps the existing entry for that version. The app's
# appVersion is synced automatically on release by release-chart-appversion.yml.
on:
  push:
    branches:
      - master
    paths:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and publish charts to gh-pages
        env:
          GIT_USER: ${{ github.actor }}
          GIT_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: bash hack/publish-charts.sh
