name: Sync Chart appVersion on Release

# On every vX.Y.Z tag (an app release), set the chart's appVersion to match the
# release, bump the chart's own patch version so it becomes a new repo entry,
# commit the change back to master, and republish the Helm repo — all in one run.
#
# This keeps charts/vm-import-ui/Chart.yaml's appVersion in lockstep with the
# app version without a manual edit. The publish is done inline (not via the
# charts-push workflow) because commits made with GITHUB_TOKEN don't trigger
# further workflow runs.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      # The chart defaults image.tag to appVersion, so it must not advertise a
      # version whose image isn't in the registry yet. The GHCR image build runs
      # in parallel (and may be slow on a busy self-hosted runner), so wait for
      # the ghcr.io/<repo>:<version> manifest to exist before publishing the chart.
      - name: Wait for the release image in GHCR
        run: |
          set -euo pipefail
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for ghcr.io/${GITHUB_REPOSITORY}:${APP_VERSION} ..."
          for i in $(seq 1 80); do
            TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:${GITHUB_REPOSITORY}:pull" \
              | sed -E 's/.*"token":"([^"]+)".*/\1/')
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.oci.image.index.v1+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
              "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/${APP_VERSION}")
            if [ "$CODE" = "200" ]; then echo "Image published."; exit 0; fi
            echo "attempt ${i}/80: HTTP ${CODE}; retrying in 30s"
            sleep 30
          done
          echo "Timed out waiting for ghcr.io/${GITHUB_REPOSITORY}:${APP_VERSION}." >&2
          exit 1

      - name: Sync chart appVersion to release tag
        id: sync
        run: |
          set -euo pipefail
          APP_VERSION="${GITHUB_REF_NAME#v}"          # v1.9.0 -> 1.9.0
          CHART=charts/vm-import-ui/Chart.yaml

          CURRENT_APP=$(awk -F'"' '/^appVersion:/{print $2}' "$CHART")
          if [ "$CURRENT_APP" = "$APP_VERSION" ]; then
            echo "Chart appVersion already ${APP_VERSION}; nothing to sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bump the chart's own patch version so the republished chart is a new
          # entry in index.yaml (helm repo index --merge keeps existing versions).
          CHART_VER=$(grep -E '^version:' "$CHART" | awk '{print $2}' | tr -d '"')
          IFS=. read -r MA MI PA <<< "$CHART_VER"
          NEW_CHART_VER="${MA}.${MI}.$((PA + 1))"

          sed -i -E "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" "$CHART"
          sed -i -E "s/^version:.*/version: ${NEW_CHART_VER}/" "$CHART"

          echo "appVersion: ${CURRENT_APP} -> ${APP_VERSION}"
          echo "chart version: ${CHART_VER} -> ${NEW_CHART_VER}"

          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add "$CHART"
          git commit -m "chore(chart): sync appVersion to ${APP_VERSION} (chart ${NEW_CHART_VER})"
          git push origin master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Package and publish charts to gh-pages
        if: steps.sync.outputs.changed == 'true'
        env:
          GIT_USER: ${{ github.actor }}
          GIT_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: bash hack/publish-charts.sh
