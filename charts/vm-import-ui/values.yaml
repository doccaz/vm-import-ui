# Default values for vm-import-ui.

replicaCount: 1

image:
  repository: ghcr.io/doccaz/vm-import-ui
  pullPolicy: IfNotPresent
  # Overrides the appVersion from Chart.yaml when set
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount for the pod
  create: true
  # Use a custom name; defaults to the chart fullname
  name: ""
  annotations: {}

rbac:
  # Create ClusterRole + ClusterRoleBinding granting the app access to
  # Harvester, KubeVirt, CDI, VM Import Controller, and Forklift resources
  create: true

service:
  type: NodePort
  port: 8080
  # Fixed NodePort. Kubernetes only allows 30000-32767 for NodePorts, so a host
  # firewall must permit that range regardless of the value chosen. 32000 sits high
  # in the range, away from the low/round ports (30000, 30080, 30443) that other
  # tools commonly grab, minimising collisions. Set to "" to let Kubernetes pick one.
  nodePort: 32000

env:
  # Log verbosity: debug | info | warn | error
  logLevel: info
  # Internal path to the React build — matches Dockerfile COPY destination
  uiPath: /ui
  # Set to "true" to run in dev/mock mode without a real cluster
  useMockData: "false"

# Rancher UI integration: create a ui.cattle.io NavLink so the app shows up in
# the Rancher / Harvester left-hand menu. The NavLink is only rendered when the
# ui.cattle.io/v1 CRD is present (Rancher-managed clusters such as Harvester),
# so leaving this enabled is safe on plain Kubernetes — it's simply skipped.
navLink:
  enabled: true
  label: "VM Import UI"
  # Menu group/section the link is filed under. Set to "" for a flat, top-level
  # item in the main menu (no group header).
  group: "Utilities"
  description: "Import VMs from VMware vCenter into Harvester"
  # External URL for the link, e.g. "http://<node-ip>:32000". Leave blank to link
  # through the in-cluster Service proxy (works without knowing a node IP, but the
  # UI must tolerate being served under a sub-path).
  url: ""
  # Icon shown beside the menu entry (data URI or URL). Defaults to the app icon.
  iconSrc: "data:image/svg+xml;base64,"

# Resource requests and limits (leave empty to use cluster defaults)
resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}
